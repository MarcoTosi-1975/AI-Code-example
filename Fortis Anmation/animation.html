<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>FORTIS - Connessione</title>
<style>
body{
    margin:0;
    height:100vh;
    background:#eaeaea;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Segoe UI;
}

.container{
    position:relative;
    width:900px;
}

img{
    width:100%;
    display:block;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.pulse{
    position:absolute;
    width:200%;
    height:4px;
    background:linear-gradient(90deg, transparent, rgba(50,205,50,0.8), transparent);
    animation:movePulse 3s linear infinite;
    top:50%;
}

@keyframes movePulse{
    0%{ transform:translateX(-50%); }
    100%{ transform:translateX(0%); }
}

.status{
    position:absolute;
    bottom:-60px;
    width:100%;
    text-align:center;
    font-size:20px;
    letter-spacing:2px;
    color:#0e2a47;
}
</style>
</head>

<body>
<div class="container">
    <img src="fortis.png">
    <div class="overlay">
        <div class="pulse"></div>
    </div>
    <div class="status">Connessione strumentazione in corso...</div>
</div>
</body>
</html>
